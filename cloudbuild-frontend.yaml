steps:
  # 1. Simple Syntax and Indentation Check
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Checking syntax and indentation of python files..."
        python -m compileall -q .
        echo "✅ Syntax check passed!"

  # 2. Build Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/harimau/frontend:latest', '-f', 'app/Dockerfile', '.']

  # 3. Fetch Backend URL for Frontend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$$(gcloud run services describe harimau-backend --region asia-southeast1 --format 'value(status.url)' --quiet)
        echo "$$BACKEND_URL" > /workspace/backend_url.txt
        echo "Fetched Backend URL: $$BACKEND_URL"

  # 4. Deploy Frontend to Cloud Run (BACKEND_URL set as runtime env var — read by API route proxy)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$$(cat /workspace/backend_url.txt)
        gcloud run deploy harimau-frontend \
          --image asia-southeast1-docker.pkg.dev/$PROJECT_ID/harimau/frontend:latest \
          --region asia-southeast1 \
          --set-env-vars BACKEND_URL=$$BACKEND_URL \
          --quiet

images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/harimau/frontend:latest'
